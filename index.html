<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── PWA / App Install ── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10B981" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── iOS / Safari PWA ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Niklaus" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- ── SEO / Meta ── -->
    <title>Niklaus Gestor</title>
    <meta name="description" content="Sistema de Gestão de Cobranças e Empréstimos" />
    <meta name="application-name" content="Niklaus Gestor" />

    <!-- ── Splash screen color for iOS ── -->
    <meta name="msapplication-TileColor" content="#0F1115" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- ── Service Worker Registration ── -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then(reg => console.log('[SW] Registrado:', reg.scope))
            .catch(err => console.warn('[SW] Falha ao registrar:', err));
        });
      }
    </script>
  </body>
</html>

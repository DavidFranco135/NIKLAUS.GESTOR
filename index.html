<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover → conteúdo vai até as bordas do notch (controlado via safe-area no CSS) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />

    <!-- ── PWA / App Install ── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10B981" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── iOS / Safari PWA ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent: barra de status transparente (usa a cor do app) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Niklaus" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- ── SEO / Meta ── -->
    <title>Niklaus Gestor</title>
    <meta name="description" content="Sistema de Gestão de Cobranças e Empréstimos" />
    <meta name="application-name" content="Niklaus Gestor" />
    <meta name="msapplication-TileColor" content="#0F1115" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- ── Fix 100vh no iOS Safari (roda antes do React montar) ─────────────
         Safari inclui a barra de endereços no 100vh, cortando o layout.
         Este script calcula a altura real e expõe como CSS var --vh.
         Ex: height: calc(var(--vh, 1vh) * 100)                              -->
    <script>
      (function () {
        function setVh() {
          var vh = window.innerHeight * 0.01;
          document.documentElement.style.setProperty('--vh', vh + 'px');
          document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
        }
        setVh();
        window.addEventListener('resize', setVh);
        // Também recalcula quando a barra do iOS aparece/desaparece
        window.addEventListener('orientationchange', function () {
          setTimeout(setVh, 300);
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- ── Service Worker ── -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js')
            .then(function (reg) { console.log('[SW] Registrado:', reg.scope); })
            .catch(function (err) { console.warn('[SW] Falha:', err); });
        });
      }
    </script>
  </body>
</html>
